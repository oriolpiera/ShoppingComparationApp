name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version, e.g. 0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: $VERSION. Use X.Y.Z"
            exit 1
          fi

      - name: Verify tag does not exist
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists. Use a different version."
            exit 1
          fi

      - name: Create release branch and bump version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BRANCH="release/v${VERSION}"

          git checkout -b "${BRANCH}"

          BUILD_NUMBER=$(git rev-list --count HEAD)
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml

          git add pubspec.yaml
          git commit -m "chore: bump version to ${VERSION}"

          git tag "v${VERSION}"

      - name: Push branch and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BRANCH="release/v${VERSION}"

          git push --atomic origin "${BRANCH}" "v${VERSION}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BRANCH="release/v${VERSION}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "Release v${VERSION}" \
            --body "Version bump to ${VERSION}

          After merge, create a GitHub Release from the tag v${VERSION} to trigger the APK build."
