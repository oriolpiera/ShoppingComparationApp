name: PR Web Preview

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: write
  id-token: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-build-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage (machine output)
        run: flutter test --machine --coverage > test-results.json
        continue-on-error: true

      - name: Build test and coverage summary
        id: test_coverage_summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          passed = 0
          failed = 0
          skipped = 0

          def iter_events(payload):
            if isinstance(payload, dict):
              yield payload
            elif isinstance(payload, list):
              for item in payload:
                yield from iter_events(item)

          with Path('test-results.json').open('r', encoding='utf-8') as fh:
            for line in fh:
              line = line.strip()
              if not line:
                continue
              try:
                payload = json.loads(line)
              except json.JSONDecodeError:
                continue

              for event in iter_events(payload):
                if event.get('type') != 'testDone':
                  continue

                result = event.get('result')
                if result == 'success':
                  passed += 1
                elif result == 'skipped':
                  skipped += 1
                else:
                  failed += 1

          coverage = 0.0
          lh = 0
          lf = 0
          lcov_path = Path('coverage/lcov.info')
          if lcov_path.exists():
            with lcov_path.open('r', encoding='utf-8') as fh:
              for row in fh:
                row = row.strip()
                if row.startswith('LH:'):
                  lh += int(row[3:])
                elif row.startswith('LF:'):
                  lf += int(row[3:])
            if lf > 0:
              coverage = (lh / lf) * 100.0

          total = passed + failed + skipped
          status = 'OK' if failed == 0 and passed > 0 else 'RED'
          summary = (
            f"Tests: {status} | total={total} passed={passed} failed={failed} "
            f"skipped={skipped} | coverage={coverage:.2f}%"
          )
          body = "\n".join([
            "## Test Summary",
            "",
            f"- Status: **{status}**",
            f"- Total: **{total}**",
            f"- Passed: **{passed}**",
            f"- Failed: **{failed}**",
            f"- Skipped: **{skipped}**",
            f"- Coverage (lines): **{coverage:.2f}%**",
          ])

          github_output = Path(os.environ['GITHUB_OUTPUT'])
          with github_output.open('a', encoding='utf-8') as out:
            out.write(f"summary={summary}\n")
            out.write(f"status={status}\n")
            out.write("body<<EOF\n")
            out.write(body + "\n")
            out.write("EOF\n")

          step_summary = Path(os.environ['GITHUB_STEP_SUMMARY'])
          with step_summary.open('a', encoding='utf-8') as s:
            s.write(body + "\n")
          PY

      - name: Upload test and coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-and-coverage
          path: |
            test-results.json
            coverage/lcov.info
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment test and coverage summary on PR
        uses: actions/github-script@v7
        env:
          TEST_COVERAGE_BODY: ${{ steps.test_coverage_summary.outputs.body }}
        with:
          script: |
            const bodyContent = process.env.TEST_COVERAGE_BODY;
            if (!bodyContent) {
              core.setFailed('Test/Coverage summary output is empty.');
              return;
            }

            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- test-coverage-summary-comment -->';
            const body = `${marker}\n${bodyContent}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const previous = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Ensure web platform scaffold
        run: flutter create . --platforms web

      - name: Build web preview
        run: flutter build web --release --dart-define=WEB_PREVIEW=true

      - name: Deploy to Firebase Hosting preview channel
        id: firebase_preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 1d

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: always()
        env:
          PREVIEW_URL: ${{ steps.firebase_preview.outputs.details_url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            if (!previewUrl) {
              core.setFailed('Firebase preview URL output is empty.');
              return;
            }

            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- firebase-preview-comment -->';
            const body = `${marker}\n🔎 PR preview ready: ${previewUrl}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const previous = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }
