name: Release Android APK

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g. 1.2.3). If empty, latest git tag vX.Y.Z is used"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Update app version for this build
        run: |
          BASE_VERSION=""
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if printf '%s' "${TAG_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              BASE_VERSION="${TAG_VERSION}"
            fi
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if printf '%s' "${INPUT_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              BASE_VERSION="${INPUT_VERSION}"
            else
              echo "Invalid workflow input version: '${INPUT_VERSION}'. Use semantic version X.Y.Z"
              exit 1
            fi
          else
            LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '1p')
            if [ -n "${LATEST_TAG}" ]; then
              BASE_VERSION="${LATEST_TAG#v}"
            fi
          fi

          if [ -z "${BASE_VERSION}" ]; then
            echo "Could not determine semantic version from release tag, workflow input, or git tags."
            echo "Expected: vX.Y.Z tag or workflow input 'version' with X.Y.Z."
            exit 1
          fi

          NEW_VERSION="${BASE_VERSION}+${BUILD_NUMBER}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "Using app version ${NEW_VERSION}"

      - name: Validate Android signing secrets
        run: |
          missing=false
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_PASSWORD ANDROID_KEY_ALIAS; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}"
              missing=true
            fi
          done

          if [ "${missing}" = "true" ]; then
            echo "Configure all Android signing secrets before running this workflow."
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Configure Android signing
        run: |
          mkdir -p android
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../release.keystore
          EOF

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Ensure Android platform scaffold
        run: flutter create . --platforms android

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
