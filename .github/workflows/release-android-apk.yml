name: Release Android APK

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install required Android NDK
        run: |
          for attempt in 1 2 3; do
            if sdkmanager --install "ndk;27.0.12077973"; then
              exit 0
            fi

            echo "NDK install failed on attempt ${attempt}."
            rm -rf "${ANDROID_SDK_ROOT}/ndk/27.0.12077973"
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Verify version matches tag
        run: |
          PUBSPEC_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/^version: //')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BASE_VERSION="${PUBSPEC_VERSION%%+*}"
          if [ "${BASE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Version mismatch: pubspec.yaml says ${BASE_VERSION}, tag says ${TAG_VERSION}"
            exit 1
          fi
          echo "Building version ${PUBSPEC_VERSION}"

      - name: Validate Android signing secrets
        run: |
          missing=false
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_PASSWORD ANDROID_KEY_ALIAS; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}"
              missing=true
            fi
          done

          if [ "${missing}" = "true" ]; then
            echo "Configure all Android signing secrets before running this workflow."
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Configure Android signing
        run: |
          mkdir -p android
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../release.keystore
          EOF

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Ensure Android platform scaffold
        run: flutter create . --platforms android

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
