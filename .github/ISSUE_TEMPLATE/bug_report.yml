name: Bug report
description: Report a reproducible problem in the app.
title: "fix: "
labels:
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Please make sure the problem is reproducible and specific. Implementation should wait until a maintainer adds the `status:approved` label.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I understand this issue should be reviewed before implementation starts.
          required: true
  - type: textarea
    id: bug_description
    attributes:
      label: Bug description
      description: Clear summary of the bug.
      placeholder: The barcode scan flow returns the wrong localized product name.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps are easiest to follow.
      placeholder: |
        1. Set device language to Catalan
        2. Open the app
        3. Scan barcode 20615420
        4. Observe the returned name
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: The app should prefer the localized product name matching the system locale.
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: The app uses the default OpenFoodFacts product_name field and returns a name in another language.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Other
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      description: App version, commit SHA, or branch if known.
      placeholder: main @ abc1234
  - type: textarea
    id: relevant_logs
    attributes:
      label: Relevant logs or payloads
      description: Paste any logs, API payloads, or screenshots references that help reproduce the issue.
      render: text
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Workarounds, edge cases, related issue links, or anything else worth noting.
